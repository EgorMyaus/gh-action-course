# =============================================================================
# GitLab CI/CD Pipeline for React App with Playwright E2E Tests
# =============================================================================
# Pipeline stages:
#   1. test          - Unit tests and linting
#   2. build         - Build Docker image (GCP E2E pipeline)
#   3. deploy-staging - Deploy to GCE ephemeral environment
#   4. e2e-test      - Run Playwright E2E tests against GCE
#   .post            - Cleanup (Terraform destroy)
# =============================================================================

stages:
  - test
  - build
  - deploy-staging
  - e2e-test

# GCP ephemeral E2E pipeline (build → deploy GCE → test → cleanup)
include:
  - local: .gitlab/ci/e2e-tests-gcp.yml

# =============================================================================
# Variables
# =============================================================================
variables:
  NODE_VERSION: "18"

# =============================================================================
# Cache Configuration
# =============================================================================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .yarn/cache/

# =============================================================================
# Default Settings
# =============================================================================
default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# =============================================================================
# STAGE: Test
# =============================================================================

unit-tests:
  stage: test
  image: node:${NODE_VERSION}-alpine
  before_script:
    - yarn install --frozen-lockfile
  script:
    - yarn test --coverage --watchAll=false --ci
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

lint:
  stage: test
  image: node:${NODE_VERSION}-alpine
  before_script:
    - yarn install --frozen-lockfile
  script:
    - yarn lint || true
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
