name: E2E Tests

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start React app
        run: |
          docker compose up -d react-app --build
          echo "Waiting for app to be healthy..."
          timeout 60 bash -c 'until curl -sf http://localhost > /dev/null; do sleep 2; done'
          echo "App is ready!"

      - name: Build e2e-tests image
        run: docker compose --profile test build e2e-tests

      - name: Run smoke tests
        run: docker compose --profile test run e2e-tests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: e2e/reports/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker compose down
