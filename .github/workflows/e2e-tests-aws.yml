name: E2E Tests on AWS

# =============================================================================
# 5-job pipeline:
#
#   build-and-push ──┐
#                    ├──→ deploy → e2e-test → cleanup
#   packer-build ────┘
#
# Why the split:
#   - Per-stage logs/timings are visible as separate job headers in the UI.
#   - build-and-push and packer-build run in parallel (no dependency).
#   - deploy waits for both: Docker image on Hub + custom AMI ready.
#   - Cleanup runs on its own runner with `if: always()` + `needs: [all]`, so
#     `terraform destroy` fires even on cancellation or upstream failure.
#   - Cleanup also deregisters the ephemeral Packer AMI + deletes its snapshot.
#   - Terraform Cloud remote state (workspace
#     playwright-react-app-dev-ephemeral) makes cross-runner destroy possible.
# =============================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS Region"
        required: true
        default: "us-east-1"
        type: choice
        options:
          - us-east-1
          - us-west-2
          - eu-west-1

concurrency:
  group: e2e-aws-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  TF_DIR: infra/environments/dev-ephemeral
  TF_VAR_aws_region: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/react-app
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  # =====================================================================
  # JOB 1: Build Docker image and push to Docker Hub
  # =====================================================================
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================================
  # JOB 2: Build Packer AMI (parallel with build-and-push)
  # =====================================================================
  packer-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ami_id: ${{ steps.build.outputs.ami_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer Init
        working-directory: packer
        run: packer init web-server.pkr.hcl

      - name: Packer Build
        id: build
        working-directory: packer
        run: |
          packer build -var "aws_region=${{ env.AWS_REGION }}" \
            -machine-readable web-server.pkr.hcl | tee packer-output.txt

          AMI_ID=$(grep 'artifact,0,id' packer-output.txt | cut -d: -f2)
          echo "Built AMI: $AMI_ID"
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"

  # =====================================================================
  # JOB 3: Terraform apply + pull image on EC2 via Instance Connect
  # =====================================================================
  deploy:
    needs: [build-and-push, packer-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      app_url: ${{ steps.tf.outputs.app_url }}
      instance_id: ${{ steps.tf.outputs.instance_id }}
      instance_ip: ${{ steps.tf.outputs.instance_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -lock-timeout=5m

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_custom_ami_id: ${{ needs.packer-build.outputs.ami_id }}
        run: terraform apply -auto-approve -lock-timeout=5m

      - name: Get Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "app_url=$(terraform output -raw app_url)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "instance_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 to be ready
        run: |
          INSTANCE_ID="${{ steps.tf.outputs.instance_id }}"
          echo "Waiting for instance $INSTANCE_ID to pass status checks..."
          aws ec2 wait instance-status-ok \
            --instance-ids "$INSTANCE_ID" \
            --region ${{ env.AWS_REGION }}
          echo "Instance is ready!"

      - name: Pull image and start container on EC2
        run: |
          INSTANCE_ID="${{ steps.tf.outputs.instance_id }}"
          INSTANCE_IP="${{ steps.tf.outputs.instance_ip }}"
          AZ=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].Placement.AvailabilityZone" \
            --output text --region ${{ env.AWS_REGION }})

          # Generate temporary SSH key
          ssh-keygen -t ed25519 -f /tmp/ec2_key -N "" -q

          SSH_OPTS="-i /tmp/ec2_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"

          # Retry loop: re-push key via EC2 Instance Connect (60s TTL) and
          # probe SSH until the on-instance helper has written authorized_keys.
          # Handles race between `send-ssh-public-key` success and the helper
          # daemon actually installing the key.
          for attempt in 1 2 3 4 5 6; do
            echo "SSH attempt $attempt/6..."
            aws ec2-instance-connect send-ssh-public-key \
              --instance-id "$INSTANCE_ID" \
              --instance-os-user ec2-user \
              --ssh-public-key file:///tmp/ec2_key.pub \
              --availability-zone "$AZ" \
              --region ${{ env.AWS_REGION }} > /dev/null

            if ssh $SSH_OPTS ec2-user@${INSTANCE_IP} "echo connected"; then
              echo "SSH ready on attempt $attempt"
              break
            fi

            if [ $attempt -eq 6 ]; then
              echo "SSH failed after 6 attempts"
              exit 1
            fi
            sleep 5
          done

          # SSH to EC2: pull public image from Docker Hub and run
          ssh $SSH_OPTS ec2-user@${INSTANCE_IP} << ENDSSH
            sudo docker pull ${{ env.DOCKERHUB_IMAGE }}:latest
            sudo docker run -d --name react-app -p 80:80 --restart unless-stopped ${{ env.DOCKERHUB_IMAGE }}:latest
            sudo docker ps
          ENDSSH

          # Clean up key
          rm -f /tmp/ec2_key /tmp/ec2_key.pub

      - name: Wait for app to respond
        run: |
          APP_URL="${{ steps.tf.outputs.app_url }}"
          echo "Waiting for $APP_URL to respond..."
          for i in $(seq 1 30); do
            if curl -sf "$APP_URL" > /dev/null 2>&1; then
              echo "App is responding after attempt $i!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "App did not respond in time!"
          exit 1

  # =====================================================================
  # JOB 4: Run Playwright E2E tests against deployed EC2
  # =====================================================================
  e2e-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: e2e/yarn.lock

      - name: Install e2e dependencies
        working-directory: e2e
        run: |
          for i in 1 2 3; do
            yarn install --frozen-lockfile --network-timeout 600000 && exit 0
            echo "yarn install failed, retry $i/3"
            sleep $((i * 10))
          done
          exit 1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (on cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Generate hosts config for AWS
        working-directory: e2e
        run: |
          cat > config/hosts.aws.json << EOF
          {
            "localhost": "${{ needs.deploy.outputs.app_url }}/",
            "production": "https://hub.testingtalks.com.au/",
            "api": "https://jsonplaceholder.typicode.com/"
          }
          EOF
          echo "Generated hosts.aws.json:"
          cat config/hosts.aws.json

      - name: Run E2E tests against AWS
        working-directory: e2e
        env:
          NODE_ENV: localhost
          COMMON_CONFIG_FILE: env/common.env
          HEADLESS: "true"
          HOSTS_URLS_PATH: /config/hosts.aws.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PROFILE="regression"
          else
            PROFILE="smoke"
          fi
          echo "Running profile: $PROFILE"
          yarn precucumber
          yarn transpile
          npx cucumber-js -p $PROFILE

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-aws
          path: e2e/reports/
          retention-days: 14

  # =====================================================================
  # JOB 5: Cleanup — Terraform destroy + AMI deregister + orphan termination
  # =====================================================================
  cleanup:
    needs: [build-and-push, packer-build, deploy, e2e-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Destroy
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -lock-timeout=5m
          terraform destroy -auto-approve -lock-timeout=5m

      - name: Deregister Packer AMI + delete snapshot
        if: needs.packer-build.outputs.ami_id != ''
        continue-on-error: true
        run: |
          AMI_ID="${{ needs.packer-build.outputs.ami_id }}"
          echo "Deregistering AMI: $AMI_ID"

          # Get snapshot ID before deregistering (AMI metadata is lost after deregister)
          SNAPSHOT_ID=$(aws ec2 describe-images \
            --image-ids "$AMI_ID" \
            --query "Images[0].BlockDeviceMappings[0].Ebs.SnapshotId" \
            --output text --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")

          # Deregister AMI
          aws ec2 deregister-image --image-id "$AMI_ID" --region ${{ env.AWS_REGION }} || true

          # Delete backing snapshot
          if [ -n "$SNAPSHOT_ID" ] && [ "$SNAPSHOT_ID" != "None" ]; then
            echo "Deleting snapshot: $SNAPSHOT_ID"
            aws ec2 delete-snapshot --snapshot-id "$SNAPSHOT_ID" --region ${{ env.AWS_REGION }} || true
          fi

          echo "AMI cleanup complete"

      - name: Force-terminate any orphaned EC2 instances
        run: |
          echo "Checking for orphaned instances..."
          INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=playwright-react-app" \
                      "Name=tag:Environment,Values=dev-ephemeral" \
                      "Name=instance-state-name,Values=running,pending,stopped" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          if [ -n "$INSTANCES" ] && [ "$INSTANCES" != "None" ]; then
            echo "Terminating orphaned instances: $INSTANCES"
            aws ec2 terminate-instances --instance-ids $INSTANCES --region ${{ env.AWS_REGION }}
          else
            echo "No orphaned instances found."
          fi

      - name: Cost guard check
        run: |
          echo "## Running instances check:" >> $GITHUB_STEP_SUMMARY
          aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=playwright-react-app" \
                      "Name=instance-state-name,Values=running,pending" \
            --query "Reservations[].Instances[].[InstanceId,State.Name,LaunchTime]" \
            --output table \
            --region ${{ env.AWS_REGION }} >> $GITHUB_STEP_SUMMARY || true

      - name: Summary
        if: always()
        run: |
          {
            echo "## E2E Tests on AWS Summary"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| build-and-push | ${{ needs.build-and-push.result }} |"
            echo "| packer-build | ${{ needs.packer-build.result }} |"
            echo "| deploy | ${{ needs.deploy.result }} |"
            echo "| e2e-test | ${{ needs.e2e-test.result }} |"
            echo ""
            echo "- **Region:** ${{ env.AWS_REGION }}"
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **Image Tag:** ${{ env.IMAGE_TAG }}"
            echo "- **Packer AMI:** \`${{ needs.packer-build.outputs.ami_id }}\` (ephemeral — deregistered)"
            echo "- **Architecture:** EC2 t3.micro (Free Tier)"
          } >> $GITHUB_STEP_SUMMARY
