# =============================================================================
# PR Checks — Fast validation on pull requests to main
# =============================================================================
# Cheap, fast quality gate that runs on every PR:
#   1. yarn install --frozen-lockfile   (fail on stale lockfile)
#   2. npx eslint src/ --max-warnings=0 (lint source code only)
#   3. yarn test --coverage --ci        (jest with coverage, non-interactive)
#   4. Upload coverage artifact
#   5. Write step summary
#
# Note: we lint src/ directly instead of `CI=true yarn build` because CRA's
# webpack build also runs autoprefixer on third-party CSS, which fails on
# upstream warnings outside our control (e.g. Bootstrap/MUI color-adjust
# deprecation). Pure ESLint on src/ is faster and scoped to our code.
#
# Separate from e2e-tests-aws.yml (which runs expensive AWS E2E tests).
# This workflow is the fast feedback loop; e2e-tests-aws.yml is the slow/full one.
#
# To enforce this as a required check: repo Settings > Branches >
# Branch protection rules > main > Require status checks > select `validate`.
# =============================================================================

name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint on src/)
        run: npx eslint src/ --max-warnings=0

      - name: Run tests with coverage
        run: yarn test --coverage --watchAll=false --ci --passWithNoTests

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: PR summary
        if: always()
        run: |
          {
            echo "## PR Checks — ${{ job.status }}"
            echo ""
            echo "| Check | Command |"
            echo "|---|---|"
            echo "| Install deps | \`yarn install --frozen-lockfile\` |"
            echo "| Lint | \`npx eslint src/ --max-warnings=0\` |"
            echo "| Tests + coverage | \`yarn test --coverage --ci\` |"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **PR:** #${{ github.event.pull_request.number }}"
            echo "- **Coverage:** uploaded as \`coverage-pr-${{ github.event.pull_request.number }}\`"
          } >> $GITHUB_STEP_SUMMARY
