# =============================================================================
# Terraform Plan on PR — Safe infra review before merge
# =============================================================================
# Runs on PRs that touch infra/ files:
#   1. terraform fmt -check    (enforce canonical formatting)
#   2. terraform validate      (catch syntax/type errors)
#   3. terraform plan          (show what would change)
#   4. Post plan output to step summary
#
# This workflow does NOT apply — only plans. Apply happens via
# e2e-tests-aws.yml on push to main.
#
# To enforce as a required check: repo Settings > Branches >
# Branch protection rules > main > Require status checks > select `plan`.
# =============================================================================

name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"

concurrency:
  group: tf-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_DIR: infra/environments/dev-ephemeral
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive -diff
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -lock-timeout=5m

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -lock=false -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Plan summary
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          {
            echo "## Terraform Plan — \`${{ env.TF_DIR }}\`"
            echo ""
            echo "| Step | Result |"
            echo "|---|---|"
            echo "| Format | \`${{ steps.fmt.outcome }}\` |"
            echo "| Init | \`${{ steps.init.outcome }}\` |"
            echo "| Validate | \`${{ steps.validate.outcome }}\` |"
            echo "| Plan | \`${{ steps.plan.outcome }}\` |"
            echo ""

            if [ "${{ steps.fmt.outcome }}" == "failure" ]; then
              echo "> **Warning:** \`terraform fmt\` found formatting issues. Run \`terraform fmt -recursive\` locally."
              echo ""
            fi

            if [ -f plan-output.txt ]; then
              echo "<details>"
              echo "<summary>Show plan output</summary>"
              echo ""
              echo '```'
              head -200 plan-output.txt
              echo '```'
              echo ""
              echo "</details>"
            fi

            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **PR:** #${{ github.event.pull_request.number }}"
          } >> $GITHUB_STEP_SUMMARY

      - name: Fail on format or plan errors
        if: steps.fmt.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "Terraform checks failed:"
          [ "${{ steps.fmt.outcome }}" == "failure" ] && echo "  - fmt: formatting issues found"
          [ "${{ steps.plan.outcome }}" == "failure" ] && echo "  - plan: planning failed"
          exit 1
