services:
  # ==========================================================================
  # React Application (Frontend)
  # ==========================================================================
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: react-app:latest
    container_name: react-app
    ports:
      - "80:80"
    environment:
      - REACT_APP_USE_LOCAL_DATA=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ==========================================================================
  # Backend API (for production with database)
  # ==========================================================================
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: react-app-api:latest
    container_name: react-app-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - USE_DATABASE=${USE_DATABASE:-false}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-reactapp}
      - DB_USER=${DB_USER:-dbadmin}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_SSL=${DB_SSL:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    profiles:
      - production
    networks:
      - app-network

  # ==========================================================================
  # E2E Tests — Cucumber + Playwright
  # Run smoke:  docker compose --profile test run e2e-tests
  # Run regression: docker compose --profile test run -e CUCUMBER_PROFILE=regression e2e-tests
  # ==========================================================================
  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    image: e2e-tests:latest
    container_name: cucumber-playwright-tests
    volumes:
      - ./e2e/reports:/app/reports
      - ./e2e/config/hosts.docker.json:/app/config/hosts.json:ro
    environment:
      - NODE_ENV=localhost
      - COMMON_CONFIG_FILE=env/common.env
      - HEADLESS=true
      - CUCUMBER_PROFILE=smoke
    depends_on:
      react-app:
        condition: service_healthy
    profiles:
      - test
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
